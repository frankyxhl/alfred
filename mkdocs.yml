site_name: Alfred — Agent Runbook
site_url: https://frankyxhl.github.io/fx-alfred
repo_url: https://github.com/frankyxhl/alfred
theme:
  name: material
  features:
  - search.suggest
  - search.highlight
  - navigation.sections
  - navigation.expand
plugins:
- search
markdown_extensions:
- pymdownx.superfences:
    custom_fences:
    - name: mermaid
      class: mermaid
      format: !!python/name:pymdownx.superfences.fence_code_format
nav:
